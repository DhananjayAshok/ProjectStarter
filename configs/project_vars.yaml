random_seed: 42
max_batch_size_api: 32 # Default max batch size for API-backed models (OpenAI, Anthropic, OpenRouter, etc.) - caps concurrent in-flight requests per infer() chunk. Can be overridden by individual calls to infer().
max_batch_size_vllm: 32 # Default max batch size for vLLM-served models - caps concurrent in-flight requests sent to the vLLM server per infer() chunk. Can be overridden by individual calls to infer().
max_batch_size_huggingface: 32 # Default max batch size for local HuggingFace models - the number of samples run through the model in a single forward pass. Can be overridden by individual calls to infer().
default_max_queries_per_minute: 60 # Fallback rate limit (queries/minute) for API models whose name isn't in _RATE_LIMITS in utils/lm_inference.py
results_dir: "results" # Path to the directory where results will be saved, meant for lightweight files, plots and logs
figure_skip_show: False # Indicates whether the Plotter object should save a figure or display it. In envs with no display you'll want to set this to True
WANDB_PROJECT: "PLACEHOLDER" # This is more for bash than for within python. Will set the wandb logger to the right project
vLLM_base_url: "http://localhost:8000/v1/"
